# Backend config baked into the jaz-backend image. Pointed at by APPLICATION_CONFIG.
# Runtime state stays under /var/lib/jaz (mount a volume to persist).
jaz:
  root: /var/lib/jaz
  workspace: /var/lib/jaz/workspaces/default
  memory:
    scheduler: true
  modelproviders:
    custom-openai:
      type: openai-compatible
      label: Custom OpenAI Endpoint
      baseurl: https://api.openai.com/v1
      apikeyenv: OPENAI_API_KEY
  acp:
    agents:
      codex:
        modelprovider: custom-openai
        model: gpt-5.5
        reasoningeffort: xhigh
